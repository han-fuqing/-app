<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="複数の中古プラットフォームを横断して、お得な商品を探せるヴィンテージマーケット。"
    />
    <meta name="theme-color" content="#f7f5ef" />
    <title>時の市｜中古価格比較</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="app-header">
      <a class="brand" href="#" aria-label="時の市 ホーム">
        <span class="brand-mark">時</span>
        <span class="brand-copy">
          <strong data-i18n="brand">時の市</strong>
          <small>VINTAGE FINDER</small>
        </span>
      </a>

      <div class="header-actions">
        <button class="language-button" id="languageButton" type="button">中文</button>
        <button class="favorites-button" id="desktopFavoritesButton" type="button">
          <span>♡</span>
          <span data-i18n="favorites">お気に入り</span>
          <b id="desktopFavoriteCount">0</b>
        </button>
      </div>
    </header>

    <main>
      <section class="hero-section">
        <div class="hero-copy">
          <span class="eyebrow" data-i18n="eyebrow">中古価格を、ひと目で比較</span>
          <h1>
            <span data-i18n="heroTitle1">欲しかったものを、</span>
            <em data-i18n="heroTitle2">納得できる価格で。</em>
          </h1>
          <p data-i18n="heroDescription">
            Mercari、Yahoo!オークション、Rakuma の出品を想定したデモデータから、お得な中古品をすばやく見つけられます。
          </p>
        </div>

        <div class="hero-score-card">
          <div class="score-orbit">
            <strong>92</strong>
            <span data-i18n="dealScore">お得度</span>
          </div>
          <div>
            <span class="recommend-label" data-i18n="recommend">🔥 おすすめ</span>
            <p data-i18n="scoreDescription">市場価格との差から、掘り出し物を自動判定。</p>
          </div>
        </div>
      </section>

      <section class="market-section" id="market">
        <div class="sticky-controls">
          <label class="search-box">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m21 21-4.3-4.3m2.3-5.2A7.5 7.5 0 1 1 4 11.5a7.5 7.5 0 0 1 15 0Z" />
            </svg>
            <input
              id="searchInput"
              type="search"
              autocomplete="off"
              data-i18n-placeholder="searchPlaceholder"
              placeholder="商品名を検索"
            />
            <button id="clearSearch" class="clear-search" type="button" aria-label="検索をクリア">×</button>
          </label>

          <div class="filter-row">
            <div class="view-tabs" role="tablist">
              <button class="view-tab active" type="button" data-view="all">
                <span data-i18n="allItems">すべて</span>
                <b id="allCount">0</b>
              </button>
              <button class="view-tab" type="button" data-view="favorites">
                <span data-i18n="favorites">お気に入り</span>
                <b id="favoriteCount">0</b>
              </button>
            </div>

            <label class="sort-control">
              <span data-i18n="sortLabel">並び替え</span>
              <select id="sortSelect">
                <option value="recommended" data-i18n="sortRecommended">おすすめ順</option>
                <option value="low" data-i18n="sortLow">価格が安い順</option>
                <option value="high" data-i18n="sortHigh">価格が高い順</option>
              </select>
            </label>
          </div>
        </div>

        <div class="results-heading">
          <div>
            <p class="results-kicker" id="resultsKicker" data-i18n="allItems">すべて</p>
            <h2><span id="resultCount">0</span> <span data-i18n="itemsFound">件の商品</span></h2>
          </div>
          <p data-i18n="mockNotice">※ 現在はデモ用の価格データです</p>
        </div>

        <div class="product-grid" id="productGrid"></div>

        <div class="empty-state" id="emptyState" hidden>
          <div>⌕</div>
          <h3 data-i18n="emptyTitle">商品が見つかりません</h3>
          <p data-i18n="emptyText">検索条件を変更して、もう一度お試しください。</p>
          <button id="resetFilters" type="button" data-i18n="reset">条件をリセット</button>
        </div>
      </section>
    </main>

    <nav class="mobile-nav" aria-label="モバイルナビゲーション">
      <button class="mobile-nav-item active" type="button" data-mobile-view="all">
        <span>⌂</span>
        <small data-i18n="market">マーケット</small>
      </button>
      <button class="mobile-nav-item" type="button" data-mobile-view="favorites">
        <span>♡</span>
        <small data-i18n="favorites">お気に入り</small>
        <b id="mobileFavoriteCount">0</b>
      </button>
    </nav>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./app.js"></script>
  </body>
</html>
